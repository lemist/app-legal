<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App Legal Pages</title>
  <meta name="description" content="Privacy policies and legal pages for iOS apps.">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: #d2d2d7;
      --link: #0066cc;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --text: #f5f5f7;
        --muted: #a1a1a6;
        --border: #424245;
        --link: #2997ff;
      }
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }
    h1 { margin: 0 0 8px; }
    p { color: var(--muted); }
    ul { padding-left: 1.25rem; }
    li { margin: 12px 0; }
    a { color: var(--link); }
  </style>
</head>
<body>
  <main>
    <h1>App legal pages</h1>
    <p>Privacy policies and related legal documents for iOS apps.</p>
    <ul>
      <li><a href="notewhen/privacy.html">NoteWhen — Privacy Policy</a></li>
      <li><a href="notewhen/support.html">NoteWhen — Support</a></li>
    </ul>
  </main>
</body>
</html>
